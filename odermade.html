<link rel="stylesheet" href="style.css">

<style>
.custom-container{
    max-width:900px;
    margin:50px auto;
    padding:40px;
    background:white;
    border-radius:12px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

.custom-container h1{
    text-align:center;
    margin-bottom:10px;
}

.custom-container p{
    text-align:center;
    color:#666;
    margin-bottom:40px;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

.form-group input,
.form-group select,
.form-group textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

.form-group textarea{
    min-height:150px;
}

.submit-btn{
    width:100%;
    padding:15px;
    background:#333;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

.submit-btn:hover{
    opacity:0.85;
}

.notice{
    margin-top:30px;
    color:#777;
    font-size:14px;
}
</style>

</head>

<div class="custom-container">

<h1>オーダーメイド制作相談</h1>

<p>
景徳鎮の工房と連携し、
オリジナル陶磁器グッズの制作を承っております。<br>
お気軽にご相談ください。
</p>

<form action="https://formspree.io/f/mykaarpw" method="POST">

<input
type="hidden"
name="_subject"
value="盗月窃月瓷坊 新規オーダーメイド相談">

<div class="form-group">
<label>お名前</label>
<input type="text" name="name" required>
</div>

<div class="form-group">
<label>メールアドレス</label>
<input type="email" name="email" required>
</div>

<div class="form-group">
<label>制作したい商品</label>
<select name="product">
<option>マグカップ</option>
<option>皿</option>
<option>茶器</option>
<option>置物</option>
<option>その他</option>
</select>
</div>

<div class="form-group">
<label>希望工芸</label>
<select name="craft">
<option>玲瓏瓷</option>
<option>温変釉</option>
<option>青花</option>
<option>釉下彩</option>
<option>色釉</option>
<option>相談したい</option>
</select>
</div>

<div class="form-group">
<label>数量</label>
<input type="text" name="quantity">
</div>

<div class="form-group">
<label>ご予算</label>
<input type="text" name="budget">
</div>

<div class="form-group">
<label>詳細内容</label>
<textarea
name="message"
placeholder="ご希望のデザイン、納期、サイズなどをご記入ください。"
required></textarea>
</div>

<button class="submit-btn" type="submit">
お問い合わせを送信
</button>

</form>

<div class="notice">
※通常3営業日以内にご返信いたします。<br>
※内容によっては制作をお受けできない場合があります。
</div>

</div>

</body>
</html>
